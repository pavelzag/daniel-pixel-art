<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pixel Color</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%231a1a2e'/><rect x='1' y='1' width='3' height='3' fill='%23e94560'/><rect x='5' y='1' width='3' height='3' fill='%23f5a623'/><rect x='9' y='1' width='3' height='3' fill='%234caf50'/><rect x='13' y='1' width='2' height='3' fill='%232196f3'/><rect x='1' y='5' width='3' height='3' fill='%23f5a623'/><rect x='5' y='5' width='3' height='3' fill='%23e94560'/><rect x='9' y='5' width='3' height='3' fill='%232196f3'/><rect x='13' y='5' width='2' height='3' fill='%234caf50'/><rect x='1' y='9' width='3' height='3' fill='%234caf50'/><rect x='5' y='9' width='3' height='3' fill='%232196f3'/><rect x='9' y='9' width='3' height='3' fill='%23f5a623'/><rect x='13' y='9' width='2' height='3' fill='%23e94560'/><rect x='1' y='13' width='14' height='2' fill='%230f3460'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      /* Lock the body to the viewport on all mobile browsers */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* ── SCREENS ──────────────────────────────────── */
    .screen {
      display: none;
      flex-direction: column;
      /* Fill whatever space the body flex gives */
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;
      /* Push all content above the home indicator / bottom safe area */
      padding-bottom: env(safe-area-inset-bottom);
    }
    .screen.active { display: flex; }

    /* ── GALLERY SCREEN ───────────────────────────── */
    #gallery-screen {
      background: #1a1a2e;
    }
    #gallery-header {
      padding: 20px 16px 10px;
      padding-top: calc(20px + env(safe-area-inset-top));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      background: #16213e;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    #gallery-header h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #gallery-header p { font-size: 12px; color: #888; margin-top: 2px; }

    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      /* Each row = 1/4 of the grid's own height minus padding and gaps.
         This guarantees exactly 4 rows fit on-screen every time. */
      grid-auto-rows: calc((100% - 28px - 42px) / 4);
      gap: 14px;
      padding: 14px;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      flex: 1 1 0;
      min-height: 0;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    /* Pull-to-refresh indicator */
    #ptr-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 0;
      overflow: hidden;
      transition: height 0.2s;
      color: #888;
      font-size: 13px;
      flex-shrink: 0;
    }
    #ptr-indicator.visible { height: 48px; }
    #ptr-indicator.releasing { color: #e94560; }
    .ptr-arrow {
      font-size: 20px;
      display: inline-block;
      transition: transform 0.2s;
    }
    #ptr-indicator.releasing .ptr-arrow { transform: rotate(180deg); }

    .puzzle-card {
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid #0f3460;
      transition: border-color 0.15s, transform 0.12s;
      display: flex;
      flex-direction: column;
      /* Card fills whatever height the grid row gives it */
      height: 100%;
    }
    .puzzle-card:active { transform: scale(0.94); border-color: #e94560; }

    /* Thumbnail: fills all remaining height above the label */
    .card-thumb {
      flex: 1;
      min-height: 0;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }
    .card-thumb canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Fixed-height label at the bottom */
    .puzzle-card-info {
      flex-shrink: 0;
      height: 28px;
      padding: 0 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }
    .puzzle-card-info h3 {
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }
    .puzzle-card-info .meta { display: none; }
    .puzzle-card .progress-pill {
      background: #0f3460;
      border-radius: 20px;
      height: 2px;
      width: 100%;
      overflow: hidden;
    }
    .puzzle-card .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 20px;
      transition: width 0.3s;
    }

    /* ── PHOTO SECTION (above grid, full width) ──── */
    #photo-section {
      padding: 10px 10px 0;
      flex-shrink: 0;
    }
    .photo-add-card {
      background: rgba(233, 69, 96, 0.08);
      border: 2px dashed #e94560;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .photo-add-card:active { transform: scale(0.98); background: rgba(233,69,96,0.16); }
    .photo-add-card .photo-icon { font-size: 30px; flex-shrink: 0; }
    .photo-add-card h3 { font-size: 14px; font-weight: 700; color: #e94560; margin-bottom: 2px; }
    .photo-add-card p { font-size: 11px; color: #888; line-height: 1.4; }

    /* ── LEVEL TABS ───────────────────────────────── */
    #level-tabs {
      display: flex;
      gap: 6px;
      padding: 8px 10px 6px;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
    }
    #level-tabs::-webkit-scrollbar { display: none; }
    .level-tab {
      background: #0f3460;
      border: none;
      color: #aaa;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .level-tab.active {
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
    }

    /* ── PHOTO CARD (inside grid, for user photos) ── */
    .photo-card {
      display: none; /* no longer used in grid */
    }

    .photo-puzzle-card { position: relative; }
    .delete-photo-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(233,69,96,0.85);
      border: none;
      color: #fff;
      width: 24px; height: 24px;
      border-radius: 50%;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    /* ── PROCESSING OVERLAY ───────────────────────── */
    #processing-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      gap: 16px;
      backdrop-filter: blur(4px);
    }
    #processing-overlay.show { display: flex; }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #processing-overlay p { color: #ccc; font-size: 15px; }

    /* ── GAME SCREEN ──────────────────────────────── */
    #game-screen { background: #1a1a2e; }

    #topbar {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top));
      padding-left: calc(12px + env(safe-area-inset-left));
      padding-right: calc(12px + env(safe-area-inset-right));
      background: #16213e;
      gap: 8px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #back-btn {
      background: #0f3460;
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #puzzle-title { font-size: 15px; font-weight: 700; flex: 1; }
    #timer-display { font-size: 12px; color: #88ccff; font-weight: 600; font-variant-numeric: tabular-nums; }
    #progress-text { font-size: 12px; color: #f5a623; font-weight: 600; }

    #progress-bar-container { height: 3px; background: #0f3460; flex-shrink: 0; }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      width: 0%;
      transition: width 0.4s;
    }

    #canvas-container {
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;
      position: relative;
      touch-action: none;
      background: #111827;
      /* Clip anything the canvas transform moves outside the box */
      contain: strict;
    }
    #game-canvas {
      position: absolute;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      /* GPU layer so transform doesn't repaint surroundings */
      will-change: transform;
      transform-origin: 0 0;
    }

    /* tool row above palette */
    #tools {
      display: flex;
      gap: 6px;
      padding: 8px 10px 4px;
      background: #16213e;
      flex-shrink: 0;
    }
    .tool-btn {
      background: #0f3460;
      border: none;
      color: #fff;
      padding: 7px 0;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      line-height: 1;
    }
    .tool-btn .icon { font-size: 16px; }
    .tool-btn:active { opacity: 0.7; }
    .tool-btn.active-tool { background: #e94560; }

    /* palette */
    #palette-area {
      background: #16213e;
      padding: 6px 10px 10px;
      flex-shrink: 0;
      /* Explicit height so it never collapses on mobile */
      height: 72px;
      box-sizing: content-box;
    }
    #palette {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
      scrollbar-width: none;
      align-items: center;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
    }
    #palette::-webkit-scrollbar { display: none; }

    .color-btn {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,0.15);
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, border-color 0.12s;
    }
    .color-btn:active { transform: scale(0.92); }
    .color-btn.selected {
      border-color: #fff;
      transform: scale(1.12);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    }
    .color-btn.done { opacity: 0.5; }
    .color-btn .num {
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    .color-btn .check {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      text-shadow: 0 0 4px rgba(0,0,0,0.7);
    }

    /* ── COMPLETE OVERLAY ─────────────────────────── */
    #complete-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    #complete-overlay.show { display: flex; }
    .complete-box {
      background: #16213e;
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      border: 1px solid #0f3460;
    }
    .complete-box .emoji { font-size: 56px; margin-bottom: 12px; }
    .complete-box h2 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .complete-box p { color: #888; font-size: 14px; margin-bottom: 12px; }
    #complete-time-badge {
      display: inline-block;
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }
    .complete-box canvas {
      image-rendering: pixelated;
      margin-bottom: 16px;
      max-width: 160px;
    }
    #leaderboard-entry {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    #player-name-input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #1e4a8a;
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    #player-name-input::placeholder { color: #556; }
    #player-name-input:focus { border-color: #e94560; }
    #leaderboard-section {
      margin-bottom: 10px;
      text-align: left;
    }
    #leaderboard-section h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; text-align: center; }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 3px;
    }
    .lb-row:nth-child(odd) { background: rgba(255,255,255,0.04); }
    .lb-row.lb-mine { background: rgba(233,69,96,0.15); }
    .lb-rank { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
    .lb-name { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-time { font-variant-numeric: tabular-nums; color: #f5a623; font-weight: 700; flex-shrink: 0; }
    #lb-loading { text-align: center; color: #666; font-size: 13px; padding: 12px 0; }
    .complete-btn {
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    .complete-btn.secondary { background: #0f3460; }
    .complete-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── DIFFICULTY MODAL ─────────────────────────── */
    #difficulty-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 400;
      backdrop-filter: blur(4px);
    }
    #difficulty-modal.show { display: flex; }
    .difficulty-box {
      background: #16213e;
      border-radius: 24px;
      padding: 28px 20px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      border: 1px solid #0f3460;
    }
    .difficulty-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .difficulty-box p { color: #888; font-size: 13px; margin-bottom: 18px; }
    .difficulty-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .diff-btn {
      background: #0f3460;
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 14px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      transition: background 0.15s, transform 0.1s;
    }
    .diff-btn:active { transform: scale(0.95); }
    .diff-btn .diff-stars { font-size: 16px; display: block; margin-bottom: 4px; }
    .diff-btn .diff-label { display: block; font-size: 14px; }
    .diff-btn .diff-meta { display: block; font-size: 11px; color: #aaa; margin-top: 2px; font-weight: 400; }
    .diff-btn.easy     { border: 2px solid #4CAF50; }
    .diff-btn.medium   { border: 2px solid #F5A623; }
    .diff-btn.hard     { border: 2px solid #E94560; }
    .diff-btn.expert   { border: 2px solid #9C27B0; }
    .diff-btn.extreme  { border: 2px solid #FF5722; }
    .diff-btn.hardcore { border: 2px solid #B71C1C; }
  </style>
</head>
<body>

<!-- hidden file picker -->
<input type="file" id="photo-input" accept="image/*" style="display:none">

<!-- ────── PROCESSING OVERLAY ────── -->
<div id="processing-overlay">
  <div class="spinner"></div>
  <p>Converting to pixel art…</p>
</div>

<!-- ────── DIFFICULTY MODAL ────── -->
<div id="difficulty-modal">
  <div class="difficulty-box">
    <h2>📷 Choose Difficulty</h2>
    <p>How detailed should your pixel art be?</p>
    <div class="difficulty-grid">
      <button class="diff-btn easy" onclick="startPhotoWithDifficulty('easy')">
        <span class="diff-stars">⭐</span>
        <span class="diff-label">Easy</span>
        <span class="diff-meta">12 px · 5 colors</span>
      </button>
      <button class="diff-btn medium" onclick="startPhotoWithDifficulty('medium')">
        <span class="diff-stars">⭐⭐</span>
        <span class="diff-label">Medium</span>
        <span class="diff-meta">22 px · 7 colors</span>
      </button>
      <button class="diff-btn hard" onclick="startPhotoWithDifficulty('hard')">
        <span class="diff-stars">⭐⭐⭐</span>
        <span class="diff-label">Hard</span>
        <span class="diff-meta">36 px · 10 colors</span>
      </button>
      <button class="diff-btn expert" onclick="startPhotoWithDifficulty('expert')">
        <span class="diff-stars">⭐⭐⭐⭐</span>
        <span class="diff-label">Expert</span>
        <span class="diff-meta">48 px · 14 colors</span>
      </button>
      <button class="diff-btn extreme" onclick="startPhotoWithDifficulty('extreme')">
        <span class="diff-stars">🔥🔥🔥</span>
        <span class="diff-label">Extreme</span>
        <span class="diff-meta">64 px · 64 colors</span>
      </button>
      <button class="diff-btn hardcore" onclick="startPhotoWithDifficulty('hardcore')">
        <span class="diff-stars">💀💀💀</span>
        <span class="diff-label">Hardcore</span>
        <span class="diff-meta">80 px · 128 colors</span>
      </button>
    </div>
    <button class="complete-btn secondary" onclick="closeDifficultyModal()" style="font-size:14px;padding:10px;">Cancel</button>
  </div>
</div>

<!-- ────── GALLERY SCREEN ────── -->
<div id="gallery-screen" class="screen active">
  <div id="gallery-header">
    <h1>🎨 Pixel Color</h1>
    <p>Tap a picture to start coloring</p>
  </div>

  <!-- Photo section — separate from puzzle grid -->
  <div id="photo-section">
    <div class="photo-add-card" onclick="document.getElementById('photo-input').click()">
      <div class="photo-icon">📷</div>
      <div>
        <h3>Add Your Photo</h3>
        <p>Turn any photo into a pixel art puzzle</p>
      </div>
    </div>
  </div>

  <!-- Level filter tabs -->
  <div id="level-tabs">
    <button class="level-tab active" data-level="all" onclick="setLevel('all')">All</button>
    <button class="level-tab" data-level="easy" onclick="setLevel('easy')">⭐ Easy</button>
    <button class="level-tab" data-level="medium" onclick="setLevel('medium')">⭐⭐ Medium</button>
    <button class="level-tab" data-level="hard" onclick="setLevel('hard')">⭐⭐⭐ Hard</button>
    <button class="level-tab" data-level="extreme" onclick="setLevel('extreme')">🔥 Extreme</button>
    <button class="level-tab" data-level="hardcore" onclick="setLevel('hardcore')">💀 Hardcore</button>
  </div>

  <div id="ptr-indicator"><span class="ptr-arrow">↓</span><span id="ptr-text">Pull to refresh</span></div>
  <div id="gallery-grid"></div>
</div>

<!-- ────── GAME SCREEN ────── -->
<div id="game-screen" class="screen">
  <div id="topbar">
    <button id="back-btn">‹</button>
    <span id="puzzle-title">Puzzle</span>
    <span id="timer-display">0:00</span>
    <span id="progress-text">0%</span>
  </div>
  <div id="progress-bar-container"><div id="progress-bar"></div></div>

  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="tools">
    <button class="tool-btn active-tool" id="tool-paint" onclick="setTool('paint')">
      <span class="icon">✏️</span><span>Paint</span>
    </button>
    <button class="tool-btn" id="tool-fill" onclick="setTool('fill')">
      <span class="icon">🪣</span><span>Fill All</span>
    </button>
    <button class="tool-btn" id="tool-zoom-fit" onclick="zoomFit()">

      46,46,46,46,21,21,21,21,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,46,
    ]
  }
];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════

let currentPuzzle = null;
let filled = [];          // parallel to data: which cells are user-filled
let selectedColor = 1;    // palette index (1-based)
let currentTool = 'paint';

// viewport transform
let scale = 1;
let offsetX = 0;
let offsetY = 0;

// undo stack: each entry is a snapshot of filled[]
let undoStack = [];

// progress per puzzle (persist in localStorage)
const SAVE_KEY = 'pixelcolor_progress';
let saveData = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════

const gameCanvas = document.getElementById('game-canvas');
const ctx = gameCanvas.getContext('2d');
const container = document.getElementById('canvas-container');

const CELL = 32;      // base cell size in px (before scale)
const FONT_THRESHOLD = 12; // show numbers when cellSize * scale > this

function cellSize() { return CELL; }
function scaledCell() { return CELL * scale; }

// ═══════════════════════════════════════════════════════════
//  GALLERY
// ═══════════════════════════════════════════════════════════

let currentLevel = 'all';

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.level === level)
  );
  renderGallery();
}

const LEVEL_LABEL = { easy: '⭐', medium: '⭐⭐', hard: '⭐⭐⭐' };

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';

  // Filter: photos always shown; built-in filtered by level
  const list = PUZZLES.filter(p =>
    currentLevel === 'all' || p.isPhoto || p.level === currentLevel
  );

  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'puzzle-card' + (p.isPhoto ? ' photo-puzzle-card' : '');
    card.onclick = () => startPuzzle(p.id);

    if (p.isPhoto) {
      const del = document.createElement('button');
      del.className = 'delete-photo-btn';
      del.textContent = '×';
      del.onclick = e => { e.stopPropagation(); deletePhotoPuzzle(p.id); };
      card.appendChild(del);
    }

    const thumb = document.createElement('div');
    thumb.className = 'card-thumb';
    const thumbCanvas = document.createElement('canvas');
    thumbCanvas.width = p.cols;
    thumbCanvas.height = p.rows;
    drawPuzzleToCanvas(thumbCanvas, p, saveData[p.id]);
    thumb.appendChild(thumbCanvas);
    card.appendChild(thumb);

    const pct = getProgress(p, saveData[p.id]);
    const info = document.createElement('div');
    info.className = 'puzzle-card-info';
    info.innerHTML = `
      <h3>${p.emoji} ${p.name}</h3>
      <div class="progress-pill"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
    card.appendChild(info);
    grid.appendChild(card);
  });
}

function drawPuzzleToCanvas(canvas, puzzle, savedFilled) {
  const c = canvas.getContext('2d');
  c.clearRect(0, 0, canvas.width, canvas.height);
  // light grey background
  c.fillStyle = '#f0f0f0';
  c.fillRect(0, 0, canvas.width, canvas.height);

  const f = savedFilled || new Array(puzzle.data.length).fill(false);
  puzzle.data.forEach((colorIdx, i) => {
    if (colorIdx === 0) return;
    const x = i % puzzle.cols;
    const y = Math.floor(i / puzzle.cols);
    const filled = f[i];
    c.fillStyle = filled ? puzzle.palette[colorIdx] : '#ddd';
    c.fillRect(x, y, 1, 1);
  });
}

function getProgress(puzzle, savedFilled) {
  if (!savedFilled) return 0;
  const total = puzzle.data.filter(v => v !== 0).length;
  if (total === 0) return 0;
  const done = savedFilled.filter((f, i) => f && puzzle.data[i] !== 0).length;
  return Math.round((done / total) * 100);
}

// ═══════════════════════════════════════════════════════════
//  START / LOAD PUZZLE
// ═══════════════════════════════════════════════════════════

function startPuzzle(id) {
  currentPuzzle = PUZZLES.find(p => p.id === id);
  if (!currentPuzzle) return;

  // load saved progress or fresh
  filled = saveData[id]
    ? [...saveData[id]]
    : new Array(currentPuzzle.data.length).fill(false);

  undoStack = [];
  selectedColor = 1;
  currentTool = 'paint';

  document.getElementById('puzzle-title').textContent = `${currentPuzzle.emoji} ${currentPuzzle.name}`;
  updateToolUI();
  buildPalette();
  showScreen('game-screen');

  // size canvas
  gameCanvas.width = currentPuzzle.cols * CELL;
  gameCanvas.height = currentPuzzle.rows * CELL;

  zoomFit();
  drawCanvas();
  updateProgress();
  startTimer();
}

function buildPalette() {
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  currentPuzzle.palette.forEach((hex, i) => {
    if (i === 0) return; // skip bg
    const btn = document.createElement('div');
    btn.className = 'color-btn';
    btn.style.background = hex;
    btn.dataset.idx = i;

    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = i;
    btn.appendChild(num);

    btn.onclick = () => selectColor(i);
    palette.appendChild(btn);
  });
  selectColor(1);
}

function selectColor(idx) {
  selectedColor = idx;
  document.querySelectorAll('.color-btn').forEach(b => {
    b.classList.toggle('selected', +b.dataset.idx === idx);
  });
  updatePaletteDone();
}

function updatePaletteDone() {
  if (!currentPuzzle) return;
  document.querySelectorAll('.color-btn').forEach(btn => {
    const idx = +btn.dataset.idx;
    const total = currentPuzzle.data.filter(v => v === idx).length;
    const done = filled.filter((f, i) => f && currentPuzzle.data[i] === idx).length;
    const isDone = total > 0 && done === total;
    btn.classList.toggle('done', isDone);
    btn.querySelector('.num').style.display = isDone ? 'none' : 'block';
    // check mark
    let check = btn.querySelector('.check');
    if (isDone) {
      if (!check) { check = document.createElement('span'); check.className = 'check'; btn.appendChild(check); }
      check.textContent = '✓';
    } else if (check) {
      check.remove();
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════

function drawCanvas() {
  if (!currentPuzzle) return;
  const { cols, rows, data, palette } = currentPuzzle;
  const w = cols * CELL;
  const h = rows * CELL;

  ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

  // background
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0, 0, w, h);

  for (let i = 0; i < data.length; i++) {
    const ci = data[i];
    const x = (i % cols) * CELL;
    const y = Math.floor(i / cols) * CELL;

    if (ci === 0) {
      // empty cell
      ctx.fillStyle = '#e8e8e8';
      ctx.fillRect(x, y, CELL, CELL);
    } else if (filled[i]) {
      // colored cell — solid, no overlay
      ctx.fillStyle = palette[ci];
      ctx.fillRect(x, y, CELL, CELL);
    } else {
      // uncolored cell — show number
      ctx.fillStyle = '#fff';
      ctx.fillRect(x, y, CELL, CELL);

      // tint with target color at low opacity
      ctx.fillStyle = hexToRgba(palette[ci], 0.18);
      ctx.fillRect(x, y, CELL, CELL);

      // number
      ctx.fillStyle = '#555';
      ctx.font = `bold ${Math.floor(CELL * 0.38)}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ci, x + CELL / 2, y + CELL / 2);
    }
  }

  // selection highlight (selected color cells) — tint only, no stroke border
  if (scaledCell() > 10) {
    ctx.fillStyle = hexToRgba(currentPuzzle.palette[selectedColor], 0.3);
    for (let i = 0; i < data.length; i++) {
      if (data[i] === selectedColor && !filled[i]) {
        const x = (i % cols) * CELL;
        const y = Math.floor(i / cols) * CELL;
        ctx.fillRect(x, y, CELL, CELL);
      }
    }
  }

  updateTransform();
}

function updateTransform() {
  gameCanvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  gameCanvas.style.transformOrigin = '0 0';
}

function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(200,200,200,${alpha})`;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ═══════════════════════════════════════════════════════════
//  ZOOM / PAN
// ═══════════════════════════════════════════════════════════

function zoomFit() {
  if (!currentPuzzle) return;
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const pw = currentPuzzle.cols * CELL;
  const ph = currentPuzzle.rows * CELL;
  scale = Math.min(cw / pw, ch / ph) * 0.92;
  offsetX = (cw - pw * scale) / 2;
  offsetY = (ch - ph * scale) / 2;
  updateTransform();
}

function clampOffset() {
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const pw = currentPuzzle.cols * CELL * scale;
  const ph = currentPuzzle.rows * CELL * scale;
  const minX = Math.min(0, cw - pw);
  const minY = Math.min(0, ch - ph);
  const maxX = Math.max(0, cw - pw);
  const maxY = Math.max(0, ch - ph);
  offsetX = Math.min(maxX + 40, Math.max(minX - 40, offsetX));
  offsetY = Math.min(maxY + 40, Math.max(minY - 40, offsetY));
}

// ═══════════════════════════════════════════════════════════
//  TOUCH / POINTER INPUT
// ═══════════════════════════════════════════════════════════

let pointers = {};
let lastPinchDist = null;
let lastPanX = null;
let lastPanY = null;
let didMove = false;
let touchStartTime = 0;

container.addEventListener('pointerdown', onPointerDown, { passive: false });
container.addEventListener('pointermove', onPointerMove, { passive: false });
container.addEventListener('pointerup', onPointerUp, { passive: false });
container.addEventListener('pointercancel', onPointerUp, { passive: false });

function onPointerDown(e) {
  e.preventDefault();
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  const count = Object.keys(pointers).length;
  if (count === 1) {
    lastPanX = e.clientX;
    lastPanY = e.clientY;
    didMove = false;
    touchStartTime = Date.now();
  }
  if (count === 2) {
    lastPinchDist = getPinchDist();
    lastPanX = null;
  }
}

function onPointerMove(e) {
  e.preventDefault();
  if (!pointers[e.pointerId]) return;
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };

  const count = Object.keys(pointers).length;

  if (count === 2) {
    // pinch zoom
    const dist = getPinchDist();
    if (lastPinchDist) {
      const ratio = dist / lastPinchDist;
      const center = getPinchCenter();
      zoomAround(ratio, center.x - container.getBoundingClientRect().left, center.y - container.getBoundingClientRect().top);
    }
    lastPinchDist = dist;
    didMove = true;
    // also pan with two fingers
    const center = getPinchCenter();
    const cx = center.x - container.getBoundingClientRect().left;
    const cy = center.y - container.getBoundingClientRect().top;
    if (lastPanX !== null) {
      offsetX += cx - lastPanX;
      offsetY += cy - lastPanY;
      clampOffset();
      updateTransform();
    }
    lastPanX = cx;
    lastPanY = cy;
  } else if (count === 1) {
    const dx = e.clientX - lastPanX;
    const dy = e.clientY - lastPanY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      didMove = true;
      offsetX += dx;
      offsetY += dy;
      clampOffset();
      updateTransform();
    }
    lastPanX = e.clientX;
    lastPanY = e.clientY;
  }
}

function onPointerUp(e) {
  e.preventDefault();
  const wasDown = pointers[e.pointerId];
  delete pointers[e.pointerId];
  lastPinchDist = null;

  const count = Object.keys(pointers).length;
  if (count === 0 && !didMove && wasDown) {
    // tap
    const rect = container.getBoundingClientRect();
    handleTap(wasDown.x - rect.left, wasDown.y - rect.top);
  }
  if (count === 1) {
    // last remaining finger — reset pan ref
    const p = Object.values(pointers)[0];
    lastPanX = p.x;
    lastPanY = p.y;
  }
}

function getPinchDist() {
  const pts = Object.values(pointers);
  if (pts.length < 2) return 0;
  const dx = pts[0].x - pts[1].x;
  const dy = pts[0].y - pts[1].y;
  return Math.sqrt(dx * dx + dy * dy);
}

function getPinchCenter() {
  const pts = Object.values(pointers);
  return { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
}

function zoomAround(ratio, cx, cy) {
  const newScale = Math.max(0.3, Math.min(8, scale * ratio));
  const actualRatio = newScale / scale;
  offsetX = cx - actualRatio * (cx - offsetX);
  offsetY = cy - actualRatio * (cy - offsetY);
  scale = newScale;
  clampOffset();
  updateTransform();
}

// mouse wheel zoom for desktop
container.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const ratio = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  zoomAround(ratio, cx, cy);
}, { passive: false });

// ═══════════════════════════════════════════════════════════
//  TAP / PAINT
// ═══════════════════════════════════════════════════════════

function handleTap(screenX, screenY) {
  if (!currentPuzzle) return;
  // convert screen coords to canvas cell
  const canvasX = (screenX - offsetX) / scale;
  const canvasY = (screenY - offsetY) / scale;
  const col = Math.floor(canvasX / CELL);
  const row = Math.floor(canvasY / CELL);
  if (col < 0 || col >= currentPuzzle.cols || row < 0 || row >= currentPuzzle.rows) return;

  const idx = row * currentPuzzle.cols + col;
  const ci = currentPuzzle.data[idx];
  if (ci === 0) return; // empty cell

  if (currentTool === 'fill') {
    // fill all cells matching the tapped cell's color
    selectColor(ci);
    fillAll(ci);
    setTool('paint'); // return to paint after fill
  } else {
    // paint mode: only paint if tapped cell matches selected color
    if (ci !== selectedColor) {
      // tap on a different color — auto-select it
      selectColor(ci);
      drawCanvas();
      return;
    }
    if (!filled[idx]) {
      pushUndo();
      filled[idx] = true;
      save();
      drawCanvas();
      updateProgress();
      updatePaletteDone();
      checkComplete();
    }
  }
}

function fillAll(colorIdx) {
  const cells = currentPuzzle.data
    .map((ci, i) => ({ ci, i }))
    .filter(({ ci, i }) => ci === colorIdx && !filled[i]);
  if (cells.length === 0) return;
  pushUndo();
  cells.forEach(({ i }) => { filled[i] = true; });
  save();
  drawCanvas();
  updateProgress();
  updatePaletteDone();
  checkComplete();
}

// ═══════════════════════════════════════════════════════════
//  UNDO
// ═══════════════════════════════════════════════════════════

function pushUndo() {
  undoStack.push([...filled]);
  if (undoStack.length > 30) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  filled = undoStack.pop();
  save();
  drawCanvas();
  updateProgress();
  updatePaletteDone();
}

// ═══════════════════════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════════════════════

function updateProgress() {
  const total = currentPuzzle.data.filter(v => v !== 0).length;
  const done = filled.filter((f, i) => f && currentPuzzle.data[i] !== 0).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

// ═══════════════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════════════

function save() {
  saveData[currentPuzzle.id] = [...filled];
  localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
}

// ═══════════════════════════════════════════════════════════
//  COMPLETE
// ═══════════════════════════════════════════════════════════

function checkComplete() {
  const total = currentPuzzle.data.filter(v => v !== 0).length;
  const done = filled.filter((f, i) => f && currentPuzzle.data[i] !== 0).length;
  if (done >= total) {
    setTimeout(showComplete, 400);
  }
}

function showComplete() {
  stopTimer();

  // draw completion image
  const cc = document.getElementById('complete-canvas');
  const { cols, rows, data, palette } = currentPuzzle;
  const size = 160;
  cc.width = size;
  cc.height = Math.round(size * rows / cols);
  const c = cc.getContext('2d');
  c.clearRect(0, 0, cc.width, cc.height);
  data.forEach((ci, i) => {
    if (ci === 0) return;
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = Math.round(col * cc.width / cols);
    const y = Math.round(row * cc.height / rows);
    const w = Math.round((col + 1) * cc.width / cols) - x;
    const h = Math.round((row + 1) * cc.height / rows) - y;
    c.fillStyle = palette[ci];
    c.fillRect(x, y, w, h);
  });

  // show time
  document.getElementById('complete-time-badge').textContent = '⏱ ' + formatTime(elapsedSeconds);
  document.getElementById('complete-puzzle-name').textContent = `${currentPuzzle.emoji} ${currentPuzzle.name}`;

  // reset submission UI
  const nameInput = document.getElementById('player-name-input');
  const btn = document.getElementById('submit-score-btn');
  nameInput.value = lastSubmittedName;
  nameInput.disabled = false;
  btn.disabled = false;
  btn.textContent = 'Submit';

  document.getElementById('complete-overlay').classList.add('show');
  loadLeaderboard(currentPuzzle.id);
}

function closeComplete() {
  document.getElementById('complete-overlay').classList.remove('show');
}

function goGallery() {
  closeComplete();
  showScreen('gallery-screen');
  renderGallery();
}

// ═══════════════════════════════════════════════════════════
//  TOOLS
// ═══════════════════════════════════════════════════════════

function setTool(tool) {
  currentTool = tool;
  updateToolUI();
}

function updateToolUI() {
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-tool'));
  const btn = document.getElementById('tool-' + currentTool);
  if (btn) btn.classList.add('active-tool');
}

// ═══════════════════════════════════════════════════════════
//  SCREEN NAVIGATION
// ═══════════════════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('back-btn').onclick = () => {
  showScreen('gallery-screen');
  renderGallery();
};

// ═══════════════════════════════════════════════════════════
//  PHOTO → PIXEL ART
// ═══════════════════════════════════════════════════════════

const PHOTO_SAVE_KEY = 'pixelcolor_photos';
const MAX_GRID = 22;   // longest side in cells
const NUM_COLORS = 7;  // palette size for photos

// Load saved photo puzzles into PUZZLES array
function loadPhotoPuzzles() {
  const saved = JSON.parse(localStorage.getItem(PHOTO_SAVE_KEY) || '[]');
  saved.forEach(p => PUZZLES.push(p));
}

function savePhotoPuzzles() {
  const photos = PUZZLES.filter(p => p.isPhoto);
  localStorage.setItem(PHOTO_SAVE_KEY, JSON.stringify(photos));
}

function deletePhotoPuzzle(id) {
  const idx = PUZZLES.findIndex(p => p.id === id);
  if (idx !== -1) PUZZLES.splice(idx, 1);
  delete saveData[id];
  localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  savePhotoPuzzles();
  renderGallery();
}

// Wire up the file input
let pendingPhotoFile = null;

document.getElementById('photo-input').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = ''; // reset so same file can be picked again
  if (file) {
    pendingPhotoFile = file;
    document.getElementById('difficulty-modal').classList.add('show');
  }
});

const PHOTO_DIFFICULTY = {
  easy:     { grid: 12,  colors: 5   },
  medium:   { grid: 22,  colors: 7   },
  hard:     { grid: 36,  colors: 10  },
  expert:   { grid: 48,  colors: 14  },
  extreme:  { grid: 64,  colors: 64  },
  hardcore: { grid: 80,  colors: 128 },
};

function startPhotoWithDifficulty(level) {
  document.getElementById('difficulty-modal').classList.remove('show');
  const { grid, colors } = PHOTO_DIFFICULTY[level];
  if (pendingPhotoFile) processPhoto(pendingPhotoFile, grid, colors);
  pendingPhotoFile = null;
}

function closeDifficultyModal() {
  document.getElementById('difficulty-modal').classList.remove('show');
  pendingPhotoFile = null;
}

function processPhoto(file, maxGrid, numColors) {
  const overlay = document.getElementById('processing-overlay');
  overlay.classList.add('show');

  const img = new Image();
  const url = URL.createObjectURL(file);

  img.onload = () => {
    URL.revokeObjectURL(url);

    // ── 1. Resize to grid ──────────────────────────
    const aspect = img.naturalWidth / img.naturalHeight;
    let cols, rows;
    if (aspect >= 1) {
      cols = maxGrid;
      rows = Math.max(4, Math.round(maxGrid / aspect));
    } else {
      rows = maxGrid;
      cols = Math.max(4, Math.round(maxGrid * aspect));
    }

    const offscreen = document.createElement('canvas');
    offscreen.width = cols;
    offscreen.height = rows;
    const c = offscreen.getContext('2d');
    c.drawImage(img, 0, 0, cols, rows);

    // ── 2. Extract pixels ──────────────────────────
    const imageData = c.getImageData(0, 0, cols, rows).data;
    const pixels = [];
    for (let i = 0; i < imageData.length; i += 4) {
      pixels.push([imageData[i], imageData[i + 1], imageData[i + 2]]);
    }

    // ── 3. K-means quantization ────────────────────
    const centroids = kMeansPlusPlus(pixels, numColors);

    // ── 4. Map pixels → palette indices (1-based) ──
    const data = pixels.map(px => nearestIdx(px, centroids) + 1);

    // ── 5. Build puzzle ────────────────────────────
    const puzzle = {
      id: 'photo_' + Date.now(),
      name: 'My Photo',
      emoji: '📷',
      isPhoto: true,
      cols,
      rows,
      palette: [null, ...centroids.map(rgbToHex)],
      data,
    };

    PUZZLES.unshift(puzzle);
    savePhotoPuzzles();

    overlay.classList.remove('show');
    startPuzzle(puzzle.id);
  };

  img.onerror = () => {
    URL.revokeObjectURL(url);
    overlay.classList.remove('show');
    alert('Could not load image. Please try another.');
  };

  img.src = url;
}

// ── K-Means++ initialization + clustering ─────────────────

function kMeansPlusPlus(pixels, k) {
  // Pick first centroid randomly
  const centroids = [pixels[Math.floor(Math.random() * pixels.length)].slice()];

  // Pick remaining centroids weighted by distance²
  while (centroids.length < k) {
    const dists = pixels.map(px => {
      const d = Math.min(...centroids.map(c => colorDistSq(px, c)));
      return d;
    });
    const total = dists.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < pixels.length; i++) {
      r -= dists[i];
      if (r <= 0) { centroids.push(pixels[i].slice()); break; }
    }
  }

  // Iterate k-means
  for (let iter = 0; iter < 12; iter++) {
    const sums = Array.from({ length: k }, () => [0, 0, 0]);
    const counts = new Array(k).fill(0);

    for (const px of pixels) {
      const idx = nearestIdx(px, centroids);
      sums[idx][0] += px[0];
      sums[idx][1] += px[1];
      sums[idx][2] += px[2];
      counts[idx]++;
    }

    let moved = false;
    for (let j = 0; j < k; j++) {
      if (counts[j] === 0) continue;
      const newC = sums[j].map(v => Math.round(v / counts[j]));
      if (colorDistSq(newC, centroids[j]) > 1) moved = true;
      centroids[j] = newC;
    }
    if (!moved) break;
  }

  return centroids;
}

function nearestIdx(px, centroids) {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < centroids.length; i++) {
    const d = colorDistSq(px, centroids[i]);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function colorDistSq([r1, g1, b1], [r2, g2, b2]) {
  return (r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2;
}

function rgbToHex([r, g, b]) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

(function setupPTR() {
  const grid = document.getElementById('gallery-grid');
  const indicator = document.getElementById('ptr-indicator');
  const ptrText = document.getElementById('ptr-text');
  const THRESHOLD = 72;   // px of pull needed to trigger
  let startY = 0;
  let pulling = false;
  let triggered = false;

  grid.addEventListener('touchstart', e => {
    if (grid.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
      triggered = false;
    }
  }, { passive: true });

  grid.addEventListener('touchmove', e => {
    if (!pulling) return;
    const delta = e.touches[0].clientY - startY;
    if (delta <= 0) { pulling = false; return; }

    const capped = Math.min(delta * 0.5, THRESHOLD + 16);
    indicator.style.height = capped + 'px';
    indicator.classList.toggle('visible', capped > 8);
    indicator.classList.toggle('releasing', capped >= THRESHOLD);
    ptrText.textContent = capped >= THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
  }, { passive: true });

  grid.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const h = parseFloat(indicator.style.height || 0);
    if (h >= THRESHOLD && !triggered) {
      triggered = true;
      ptrText.textContent = 'Refreshing…';
      indicator.style.height = '48px';
      setTimeout(() => {
        saveData = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
        renderGallery();
        indicator.style.height = '0';
        indicator.classList.remove('visible', 'releasing');
      }, 600);
    } else {
      indicator.style.height = '0';
      indicator.classList.remove('visible', 'releasing');
    }
  }, { passive: true });
})();

loadPhotoPuzzles();

let timerStart = null;
let timerInterval = null;
let elapsedSeconds = 0;

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  elapsedSeconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - timerStart) / 1000);
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  elapsedSeconds = Math.floor((Date.now() - timerStart) / 1000);
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
  document.getElementById('timer-display').textContent = '⏱ ' + formatTime(elapsedSeconds);
}

async function neonQuery(query, params = []) {
  const res = await fetch(`https://${NEON_HOST}/sql`, {
    method: 'POST',
    headers: {
      'Content-Type':         'application/json',
      'Neon-Connection-String': `postgresql://${NEON_USER}:${NEON_PASS}@${NEON_HOST}/${NEON_DB}?sslmode=require`,
      'Neon-Password':          NEON_PASS,
    },
    body: JSON.stringify({ query, params }),
  });
  if (!res.ok) throw new Error(`Neon error ${res.status}: ${await res.text()}`);
  return res.json();
}

let lastSubmittedName = localStorage.getItem('lb_player_name') || '';

async function loadLeaderboard(puzzleId) {
  const listEl = document.getElementById('leaderboard-list');
  listEl.innerHTML = '<div id="lb-loading">Loading…</div>';
  try {
    const result = await neonQuery(
      'SELECT player_name, time_seconds FROM leaderboard WHERE puzzle_id = $1 ORDER BY time_seconds ASC LIMIT 10',
      [puzzleId]
    );
    const rows = result.rows || [];
    if (rows.length === 0) {
      listEl.innerHTML = '<div id="lb-loading">No entries yet — be the first!</div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    listEl.innerHTML = rows.map((row, i) => {
      const isMine = row.player_name === lastSubmittedName;
      return `<div class="lb-row${isMine ? ' lb-mine' : ''}">
        <span class="lb-rank">${medals[i] || (i + 1)}</span>
        <span class="lb-name">${escHtml(row.player_name)}</span>
        <span class="lb-time">${formatTime(row.time_seconds)}</span>
      </div>`;
    }).join('');
  } catch (e) {
    listEl.innerHTML = '<div id="lb-loading">Could not load scores.</div>';
    console.error(e);
  }
}

async function submitScore() {
  const nameInput = document.getElementById('player-name-input');
  const btn = document.getElementById('submit-score-btn');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }

  btn.disabled = true;
  btn.textContent = '…';
  lastSubmittedName = name;
  localStorage.setItem('lb_player_name', name);

  try {
    await neonQuery(
      'INSERT INTO leaderboard (player_name, puzzle_id, puzzle_name, time_seconds) VALUES ($1, $2, $3, $4)',
      [name, currentPuzzle.id, currentPuzzle.name, elapsedSeconds]
    );
    btn.textContent = '✓';
    nameInput.disabled = true;
    await loadLeaderboard(currentPuzzle.id);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Submit';
    console.error(e);
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
